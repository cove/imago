<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p id="brand" class="brand">viewer</p>
        <h1 id="title" class="title">Media Viewer</h1>
        <p id="intro" class="intro">Loading...</p>
      </div>
    </header>

    <main>
      <section id="status" class="status"></section>
      <section id="grid" class="grid" aria-live="polite"></section>
      <section id="photobook" class="photobook hidden" aria-live="polite">
        <div class="book-stage">
          <article class="book-spread">
            <div class="spread-page left">
              <div id="leftMediaWrap" class="book-media-wrap"></div>
              <div class="book-meta">
                <h2 id="leftTitle" class="item-title"></h2>
                <p id="leftCaption" class="item-caption"></p>
              </div>
            </div>
            <div class="spread-page right">
              <div id="rightMediaWrap" class="book-media-wrap"></div>
              <div class="book-meta">
                <h2 id="rightTitle" class="item-title"></h2>
                <p id="rightCaption" class="item-caption"></p>
              </div>
            </div>
          </article>
          <article id="turnPage" class="turn-page" aria-hidden="true">
            <div id="turnLeaf" class="turn-leaf">
              <div class="turn-face turn-front">
                <div id="turnFrontMediaWrap" class="book-media-wrap turn-media-wrap"></div>
                <div class="book-meta turn-meta">
                  <h2 id="turnFrontTitle" class="item-title"></h2>
                  <p id="turnFrontCaption" class="item-caption"></p>
                </div>
              </div>
              <div class="turn-face turn-back">
                <div id="turnBackMediaWrap" class="book-media-wrap turn-media-wrap"></div>
                <div class="book-meta turn-meta">
                  <h2 id="turnBackTitle" class="item-title"></h2>
                  <p id="turnBackCaption" class="item-caption"></p>
                </div>
              </div>
              <div class="turn-shade"></div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer class="control-dock">
      <div class="global-controls">
        <div class="control-field">
          <label class="label" for="modeSelect">Mode</label>
          <select id="modeSelect">
            <option value="grid">Grid</option>
            <option value="photobook">Photobook</option>
          </select>
        </div>
        <div class="control-field control-field-wide">
          <label class="label" for="albumSelect">Album</label>
          <select id="albumSelect"></select>
        </div>
      </div>
      <div id="bookControls" class="book-controls">
        <button id="prevPageBtn" class="book-btn" type="button">Prev Spread</button>
        <p id="pageLabel" class="page-label">Spread 0 / 0</p>
        <button id="fullscreenBtn" class="book-btn" type="button">Fullscreen</button>
        <button id="nextPageBtn" class="book-btn" type="button">Next Spread</button>
      </div>
    </footer>

    <template id="cardTemplate">
      <article class="card">
        <div class="media-wrap"></div>
        <div class="meta">
          <h2 class="item-title"></h2>
          <p class="item-caption"></p>
          <div class="item-links">
            <a class="item-link" target="_blank" rel="noreferrer noopener">Open source</a>
            <a class="item-link embed-link" target="_blank" rel="noreferrer noopener">Open embed</a>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
