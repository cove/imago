# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Imago local prompt replay for photoalbums evals

commandLineOptions:
  host: 0.0.0.0

prompts:
  - file://prompts/production.txt
  - file://prompts/shared_middle_strict.txt

providers:
  - id: file://provider.py
    label: gemma31b-greedy
    config:
      model: gemma-4-e4b-it-mlx
      endpoint: http://127.0.0.1:1234/v1/chat/completions
      response_format: page_caption_payload
      temperature: 0.0
      max_tokens: 256
      image_max_edge: 1600
      stream: false
  - id: file://provider.py
    label: gemma31b-tp09-tk40
    config:
      model: gemma-4-e4b-it-mlx
      endpoint: http://127.0.0.1:1234/v1/chat/completions
      response_format: page_caption_payload
      temperature: 0.0
      max_tokens: 256
      top_p: 0.9
      top_k: 40
      min_p: 0.05
      seed: 123
      image_max_edge: 1600
      stream: false

tests:
  - file://tests.py:generate_tests

defaultTest:
  assert:
    - type: python
      value: file://assert.py:get_assert
